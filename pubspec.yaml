name: genealogic_balear
description: "A Flutter application for visualizing and exploring family trees in the Balearic Islands."
publish_to: 'none'
version: 1.0.0+15

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  file_picker: ^11.0.2
  graphview: ^1.5.1
  google_fonts: ^8.1.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  cached_network_image: ^3.4.1
  http: ^1.6.0
  html: ^0.15.6
  flutter_map: ^8.3.0
  geocoding: ^4.0.0
  latlong2: ^0.9.1
  flutter_markdown: ^0.7.7+1
  url_launcher: ^6.3.2
  connectivity_plus: ^7.1.1
  universal_html: ^2.3.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/logo.png"
  image_path: "assets/images/logo.png"

flutter:

  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
    - README.md