name: genealogic
description: "A Flutter application for visualizing and exploring family trees."
publish_to: 'none'
version: 1.0.0+5

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  file_picker: ^11.0.2
  graphview: ^1.5.1
  google_fonts: ^8.1.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  cached_network_image: ^3.4.1
  http: ^1.6.0
  html: ^0.15.6
  flutter_map: ^8.3.0
  geocoding: ^4.0.0
  latlong2: ^0.9.1
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true
  assets:
    - assets/data/myheritage.ged
    - assets/data/locations.json
    - README.md
    